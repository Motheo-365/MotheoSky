<!-- Displays the current progress of the tracked flight -->
@if (progress > 0) {
    <div class="progress-box">
        <div class="progress-text">
            <span>Flight Progress</span>
            <strong>{{ progress }}%</strong>
        </div>

        <progress
            [value]="progress"
            max="100">
        </progress>
    </div>
}
